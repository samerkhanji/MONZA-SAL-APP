# Fly.io deploy manifest for the Grafana Alloy scraper.
# Free Hobby tier: 1× shared-cpu-1x @ 256 MB, single region. Plenty for Alloy.

app  = "monza-supabase-alloy"
primary_region = "ams"         # pick a region close to your Supabase cluster (fra/ams/lhr are good EU picks)

[build]
  dockerfile = "Dockerfile"

[env]
  ALLOY_DEPLOY_MODE = "fly"

# Expose Alloy's UI so you can browse "http://<flyapp>.fly.dev/" for the
# built-in debug UI. It does not expose metrics; Basic Auth against
# https_auth below is optional if you want to lock it down.
[[services]]
  protocol = "tcp"
  internal_port = 12345
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256
