# fly.toml app configuration file generated for monza-supabase-alloy on 2026-04-25T11:16:34+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'monza-supabase-alloy'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOY_DEPLOY_MODE = 'fly'

[[services]]
  protocol = 'tcp'
  internal_port = 12345
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
