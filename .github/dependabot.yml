version: 2
updates:
  # npm dependencies for the Next.js app
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Beirut"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group all minor + patch updates into ONE PR per category to reduce noise
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version bumps for big frameworks need manual review; let Dependabot suggest individually
      # (no entries here — Dependabot will still open major-version PRs separately)
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(actions)"
