# When main is pushed, automatically sync to phone branch.
# Keeps the phone build (PWA/mobile) up to date with desktop.
name: Sync main to phone

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push to phone branch
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # checkout often does not create refs/remotes/origin/phone; without it,
      # `git push --force-with-lease` has no lease baseline and behaves like a normal push → non-FF reject.
      - name: Sync main to phone
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout -B phone origin/main
          git push --force-with-lease origin phone
