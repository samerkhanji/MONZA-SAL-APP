name: Build Android AAB (TWA)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer, must increment each release)'
        required: true
        default: '1'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'monza-android-2026-keystore' }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'monza-android-2026-key' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Probe live manifest reachability
        run: |
          set -e
          echo "Fetching live manifest from monzasal.vercel.app..."
          curl -fsSL https://monzasal.vercel.app/manifest.json | head -c 2000
          echo ""

      - name: Prepare TWA project directory
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/twa"
          cd "$RUNNER_TEMP/twa"

          cat > twa-manifest.json <<'MANIFEST_EOF'
          {
            "packageId": "com.monzasal.app",
            "host": "monzasal.vercel.app",
            "name": "Monza App",
            "launcherName": "Monza",
            "display": "standalone",
            "themeColor": "#F59E0B",
            "themeColorDark": "#111827",
            "navigationColor": "#F59E0B",
            "navigationColorDark": "#111827",
            "navigationDividerColor": "#F59E0B",
            "navigationDividerColorDark": "#111827",
            "backgroundColor": "#111827",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "https://monzasal.vercel.app/icons/icon-512.png",
            "maskableIconUrl": "",
            "monochromeIconUrl": "",
            "splashScreenFadeOutDuration": 300,
            "orientation": "any",
            "fingerprints": [],
            "shortcuts": [],
            "generatorApp": "monza-ci-workflow",
            "webManifestUrl": "https://monzasal.vercel.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://monzasal.vercel.app/",
            "minSdkVersion": 19,
            "additionalTrustedOrigins": [],
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "appVersionName": "${{ github.event.inputs.version_name }}",
            "appVersion": ${{ github.event.inputs.version_code }},
            "appVersionCode": ${{ github.event.inputs.version_code }}
          }
          MANIFEST_EOF

          echo "Generated twa-manifest.json:"
          cat twa-manifest.json

      - name: Restore or generate keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          cd "$RUNNER_TEMP/twa"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from ANDROID_KEYSTORE_BASE64 secret"
            echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
            echo "fresh=false" >> $GITHUB_OUTPUT
          else
            echo "No keystore secret found. Generating a fresh keystore."
            echo "This keystore will be uploaded as an artifact — DOWNLOAD AND BACK IT UP."
            keytool -genkeypair -v \
              -keystore android.keystore \
              -alias android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 25000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=Monza S.A.L., O=Monza, L=Beirut, ST=Beirut, C=LB"
            echo "fresh=true" >> $GITHUB_OUTPUT
          fi
          ls -la android.keystore

      - name: Materialize TWA Android project (bubblewrap update)
        run: |
          set -e
          cd "$RUNNER_TEMP/twa"
          printf '%s\n%s\n' "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" | \
            bubblewrap update --skipVersionUpgrade || true
          if [ ! -f build.gradle ] && [ ! -f settings.gradle ]; then
            echo "No gradle project yet — running bubblewrap init from manifest"
            printf '%s\n%s\n' "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" | \
              bubblewrap init \
                --manifest=https://monzasal.vercel.app/manifest.json \
                --skipPwaValidation
          fi
          echo "Project contents:"
          ls -la

      - name: Lower Gradle heap (CI safety)
        run: |
          set -e
          cd "$RUNNER_TEMP/twa"
          if [ -f gradle.properties ]; then
            sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8/' gradle.properties
            grep "org.gradle.jvmargs" gradle.properties || true
          fi

      - name: Build AAB + APK
        run: |
          set -e
          cd "$RUNNER_TEMP/twa"
          printf '%s\n%s\n' "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" | \
            bubblewrap build --skipPwaValidation 2>&1 | tee build.log
          echo "Build artifacts produced:"
          find . -maxdepth 2 \( -name "*.aab" -o -name "*.apk" \) -ls

      - name: Read assetlinks.json fingerprint
        id: assetlinks
        run: |
          set -e
          cd "$RUNNER_TEMP/twa"
          if [ -f assetlinks.json ]; then
            echo "::group::assetlinks.json"
            cat assetlinks.json
            echo "::endgroup::"
            cp assetlinks.json "$GITHUB_WORKSPACE/assetlinks.json"
          else
            FINGERPRINT=$(keytool -list -v -keystore android.keystore -alias android \
              -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | grep "SHA256:" | head -1 | sed 's/.*SHA256: //')
            cat > "$GITHUB_WORKSPACE/assetlinks.json" <<JSON
          [
            {
              "relation": ["delegate_permission/common.handle_all_urls"],
              "target": {
                "namespace": "android_app",
                "package_name": "com.monzasal.app",
                "sha256_cert_fingerprints": ["$FINGERPRINT"]
              }
            }
          ]
          JSON
            cat "$GITHUB_WORKSPACE/assetlinks.json"
          fi

      - name: Upload AAB (Play Store upload artifact)
        uses: actions/upload-artifact@v4
        with:
          name: monza-android-aab
          path: ${{ runner.temp }}/twa/app-release-bundle.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload APK (sideload artifact)
        uses: actions/upload-artifact@v4
        with:
          name: monza-android-apk
          path: ${{ runner.temp }}/twa/app-release-signed.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload assetlinks.json (commit to web/public/.well-known/)
        uses: actions/upload-artifact@v4
        with:
          name: monza-assetlinks
          path: assetlinks.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload keystore (FIRST BUILD ONLY — back this up immediately)
        if: steps.keystore.outputs.fresh == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-CRITICAL-SAVE-IMMEDIATELY
          path: ${{ runner.temp }}/twa/android.keystore
          retention-days: 90
          if-no-files-found: error

      - name: Print next steps
        run: |
          echo "================================================================"
          echo "Build complete. Artifacts to download from this workflow run:"
          echo ""
          echo "  1. monza-android-aab               — upload this to Play Store"
          echo "  2. monza-android-apk               — for sideload testing on Android"
          echo "  3. monza-assetlinks                — commit to web/public/.well-known/assetlinks.json"
          if [ "${{ steps.keystore.outputs.fresh }}" = "true" ]; then
            echo "  4. android-keystore-CRITICAL-SAVE-IMMEDIATELY"
            echo "     — SAVE this file to a password manager NOW."
            echo "     — Also save the keystore + key passwords below."
            echo "     — If you lose any of these, you cannot publish updates."
            echo ""
            echo "     Keystore password: $KEYSTORE_PASSWORD"
            echo "     Key password:      $KEY_PASSWORD"
            echo ""
            echo "     Then set GitHub repo secrets to reuse on future builds:"
            echo "       ANDROID_KEYSTORE_BASE64   (run: base64 -w0 android.keystore)"
            echo "       ANDROID_KEYSTORE_PASSWORD = $KEYSTORE_PASSWORD"
            echo "       ANDROID_KEY_PASSWORD      = $KEY_PASSWORD"
          fi
          echo "================================================================"
