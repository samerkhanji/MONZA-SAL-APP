name: PR build check

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pr-build-check.yml"
  workflow_dispatch:

# Explicit permissions so the GITHUB_TOKEN has access to check out the repo
# even if the org default for workflow permissions is "no permissions". The
# `actions/checkout` step needs `contents: read` to fetch the ref.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript + Next build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Explicit token reference helps when the default GITHUB_TOKEN is
          # rate-limited or has been scoped to read-only by org policy.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The repository's whack-a-mole pattern (PR #36, #37, #46, #48): every
      # TypeScript error was only caught at Vercel deploy time. tsc --noEmit
      # here catches them on the PR instead.
      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json

      # Optional: full Next.js build. Skipped on draft PRs to save runner
      # minutes. Skips the sourcemap upload script that depends on env vars.
      - name: Next.js production build
        if: github.event.pull_request.draft == false
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Dummies are required: pages like /change-password call
          # createClient() at module eval during static prerender, which
          # throws "Missing Supabase config" without these. The keys are
          # not used at build time beyond being non-empty.
          NEXT_PUBLIC_SUPABASE_URL: "https://ci-build.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "ci-build-placeholder-key"
        run: npx next build
