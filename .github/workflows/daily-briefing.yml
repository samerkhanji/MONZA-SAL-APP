name: Daily Health Briefing

on:
  schedule:
    # 07:00 UTC = 10:00 Beirut (EEST). Note: in winter (EET, UTC+2) this lands at 09:00 Beirut.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate and post briefing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/daily-briefing.mjs
