name: Daily Health Briefing

on:
  schedule:
    # 06:42 UTC ~= 09:42 Beirut (EEST). Note: in winter (EET, UTC+2) this lands ~08:42.
    # Deliberately off the top of the hour: GitHub's shared cron runners are most
    # congested at :00, where scheduled jobs are heavily delayed or silently dropped.
    # An odd minute well before the hour gives the most reliable ~on-time delivery.
    - cron: "42 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate and post briefing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/daily-briefing.mjs
